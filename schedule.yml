name: Daily Price Tracker

on:
  schedule:
    # 1時間ごとに自動実行する設定
    #- cron: '0 * * * *'
    # 6時間ごとに自動実行する設定
    - cron: '0 */6 * * *'
  # ボタンを押して手動でも実行できるようにする
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: pip install -r requirements.txt

      # 🌟【ポイント】金庫(Secrets)の文字列を、discord_webhooks.jsonというファイルとして書き出す
      - name: DiscordのURLファイルを生成
        run: |
          echo '${{ secrets.DISCORD_WEBHOOKS_JSON }}' > discord_webhooks.json

      - name: 価格トラッカーの実行
        run: python mlt_price_tracker.py

      - name: 価格履歴（price_history.json）を保存してコミット
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update price history" && git push)
