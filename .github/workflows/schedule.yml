name: Daily Price Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: pip install -r requirements.txt

      - name: DiscordのURLファイルを生成
        run: |
          echo '${{ secrets.DISCORD_WEBHOOK_URL }}' > discord_webhooks.json

      - name: 価格トラッカーの実行
        run: python mlt_price_tracker.py

      - name: 価格履歴（price_history.json）を保存してコミット
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update price history" && git pull --rebase && git push)
